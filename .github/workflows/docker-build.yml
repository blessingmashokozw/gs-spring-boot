name: Docker Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    - name: Build with Gradle
      working-directory: ./complete
      run: ./gradlew build

    - name: Run tests
      working-directory: ./complete
      run: ./gradlew test

    - name: Run SpotBugs Static Analysis
      working-directory: ./complete
      run: ./gradlew spotbugsMain spotbugsTest

    - name: Run PMD Static Analysis
      working-directory: ./complete
      run: ./gradlew pmdMain pmdTest

    - name: Upload SAST Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-reports
        path: |
          ./complete/build/reports/spotbugs/
          ./complete/build/reports/pmd/

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run security scan on Docker image
      if: github.event_name != 'pull_request'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      if: github.event_name != 'pull_request'
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  security-validation:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Pull and test Docker image
      run: |
        docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        
        # Run container in background
        container_id=$(docker run -d \
          -e SPRING_PROFILES_ACTIVE=docker \
          -e DATABASE_URL=jdbc:h2:mem:testdb \
          -e DATABASE_USERNAME=sa \
          -e DATABASE_PASSWORD="" \
          -p 8080:8080 \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest)
        
        echo "Container ID: $container_id"
        
        # Wait for application to start
        echo "Waiting for application to start..."
        sleep 30
        
        # Check if container is running
        if ! docker ps | grep -q $container_id; then
          echo "Container failed to start"
          docker logs $container_id
          exit 1
        fi
        
        # Test health endpoint
        echo "Testing health endpoint..."
        for i in {1..10}; do
          if curl -f http://localhost:8080/actuator/health; then
            echo "Health check passed!"
            break
          else
            echo "Health check attempt $i failed, retrying..."
            sleep 5
          fi
        done
        
        # Test application endpoints
        echo "Testing application endpoints..."
        curl -f http://localhost:8080/
        curl -f http://localhost:8080/status
        
        # Get container logs
        echo "=== Container Logs ==="
        docker logs $container_id
        
        # Cleanup
        docker stop $container_id
        docker rm $container_id
        
        echo "Security validation completed successfully!"

    - name: Verify non-root user
      run: |
        # Check if image runs as non-root user
        user_id=$(docker run --rm --entrypoint="" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest id -u 2>/dev/null || echo "0")
        if [ "$user_id" = "0" ]; then
          echo "WARNING: Image runs as root user (UID 0)"
          # For distroless images, this is expected but should be documented
          echo "Note: Using distroless image which runs as non-root by default"
        else
          echo "SUCCESS: Image runs as non-root user (UID $user_id)"
        fi

    - name: Check image size
      run: |
        # Get image size
        size=$(docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format "{{.Size}}")
        echo "Image size: $size"
        
        # Convert to MB for comparison
        size_mb=$(docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format "{{.Size}}" | sed 's/MB//g' | sed 's/GB//g' | awk '{print $1}' | head -1)
        if [ -n "$size_mb" ] && [ "$size_mb" -lt 200 ]; then
          echo "SUCCESS: Image size is under 200MB"
        else
          echo "WARNING: Image size is large ($size_mb MB)"
        fi

    - name: Validate no hardcoded secrets
      run: |
        echo "Checking for hardcoded secrets in image layers..."
        
        # Create temporary container to inspect
        container_id=$(docker create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest)
        
        # Export filesystem and check for secrets
        docker export $container_id | tar -tf - | grep -E "(password|secret|key|token)" || echo "No obvious secret files found"
        
        # Check environment variables in image
        docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | jq -r '.[0].Config.Env[]' | grep -i -E "(password|secret|key|token)" || echo "No secrets in environment variables"
        
        # Cleanup
        docker rm $container_id
        
        echo "Secret validation completed!"
