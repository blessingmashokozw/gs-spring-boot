name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    - name: Build with Gradle Wrapper
      working-directory: ./complete
      run: ./gradlew build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ./complete/build/libs/

    - name: Run tests
      working-directory: ./complete
      run: ./gradlew test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./build-artifacts
        
    - name: Create deployment directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        script: |
          mkdir -p /var/apps
          mkdir -p /var/apps/logs
          
          # Install Java if not present
          if ! command -v java &> /dev/null; then
            apt-get update
            apt-get install -y openjdk-17-jdk
          fi
          
    - name: Copy JAR file to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        source: "build-artifacts/*.jar"
        target: "/var/apps/"
        
    - name: Deploy and restart application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        script: |
          cd /var
          
          # Stop and remove old container
          docker stop production-container || true
          docker rm production-container || true
          
          # Build and run new container
          docker build -t my-springboot-app:latest .
          docker run -d -p 8080:8080 --name production-container --restart unless-stopped my-springboot-app:latest
          
          echo "Application deployed successfully via Docker"
        script_stop: false
