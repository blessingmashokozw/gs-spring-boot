name: Deploy to Server

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types:
      - completed
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create deployment directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        script: |
          mkdir -p /var/apps
          mkdir -p /var/apps/logs
          
          # Install Java if not present
          if ! command -v java &> /dev/null; then
            apt-get update
            apt-get install -y openjdk-17-jdk
          fi
          
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./build-artifacts
        
    - name: Copy JAR file to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        source: "build-artifacts/complete/build/libs/spring-boot-complete-0.0.1-SNAPSHOT.jar"
        target: "/var/apps/"
        strip_components: 3
        
    - name: Deploy and restart application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        script: |
          cd /var/apps
          
          # Stop existing application if running
          pkill -f "spring-boot-complete" || true
          sleep 5
          
          # Start the application
          nohup java -jar spring-boot-complete-0.0.1-SNAPSHOT.jar > /var/apps/logs/application.log 2>&1 &
          
          # Verify application is running
          sleep 10
          if pgrep -f "spring-boot-complete" > /dev/null; then
            echo "Application deployed and started successfully"
          else
            echo "Application failed to start"
            tail -20 /var/apps/logs/application.log
            exit 1
          fi
