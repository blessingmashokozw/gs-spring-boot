# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      working-directory: ./complete
      run: ./gradlew build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ./complete/build/libs/

    - name: Run tests
      working-directory: ./complete
      run: ./gradlew test

    - name: Run SpotBugs Static Analysis
      working-directory: ./complete
      run: ./gradlew spotbugsMain spotbugsTest

    - name: Run PMD Static Analysis
      working-directory: ./complete
      run: ./gradlew pmdMain pmdTest

    - name: Cache Gradle build outputs
      uses: actions/cache@v4
      with:
        path: |
          ./complete/build
          ./complete/.gradle
        key: ${{ runner.os }}-gradle-build-${{ hashFiles('**/src/**/*.java', '**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-build-
    
    - name: Cache SAST analysis results
      uses: actions/cache@v4
      with:
        path: |
          ./complete/build/reports/spotbugs
          ./complete/build/reports/pmd
        key: ${{ runner.os }}-sast-${{ hashFiles('**/src/**/*.java', '**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-sast-
    
    - name: Upload SAST Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-reports
        path: |
          ./complete/build/reports/spotbugs/
          ./complete/build/reports/pmd/
